name: "Maestro — Full Regression (Android)"

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow number to run solo (e.g. 07). Leave empty for full regression."
        required: false
        default: ""

concurrency:
  group: maestro-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: Full Regression (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Regression Suite on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "Qatarat (Lambda-Stage).apk"
            mkdir -p testing/maestro/reports
            FLOW="${{ github.event.inputs.flow }}"
            if [ -n "$FLOW" ]; then
              FLOW_FILE=$(ls testing/maestro/flows/${FLOW}*.yaml 2>/dev/null | head -1)
              maestro test --format junit --output testing/maestro/reports/regression-results.xml "$FLOW_FILE"
            else
              maestro test --format junit --output testing/maestro/reports/regression-results.xml testing/maestro/flows/suites/regression.yaml
            fi

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          f = "testing/maestro/reports/regression-results.xml"
          if not pathlib.Path(f).exists():
              print("No results file found"); exit()
          root = ET.parse(f).getroot()
          suites = root.findall(".//testsuite") or [root]
          total = passed = failed = 0
          rows = ""
          for ts in suites:
              for tc in ts.findall("testcase"):
                  total += 1
                  name = tc.get("name","")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1; icon = "❌"
                  else:
                      passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🧪 Maestro Regression Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed | {passed} |
          | ❌ Failed | {failed} |
          | 📊 Total  | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Flow |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-regression-junit-${{ github.run_number }}
          path: testing/maestro/reports/regression-results.xml
          retention-days: 30

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-regression-screenshots-${{ github.run_number }}
          path: ~/.maestro/tests/
          retention-days: 14

      - name: Open GitHub Issue on nightly failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[CI] Nightly regression failed — ${new Date().toISOString().split('T')[0]}`,
              body: `Maestro regression failed on run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
              labels: ['ci-failure']
            })
