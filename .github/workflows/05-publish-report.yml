name: "Publish Test Report → GitHub Pages"

on:
  workflow_run:
    workflows:
      - "Maestro — Smoke (Android)"
      - "Maestro — Full Regression (Android)"
      - "Appium — Deep Tests (Android)"
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-report:
    name: Generate & Deploy Report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Allure CLI
        run: |
          wget -qO allure.tgz https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Download all JUnit XML artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw-artifacts/
          pattern: "*junit*"
          merge-multiple: false
        continue-on-error: true

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results/
          pattern: "appium-allure-results-*"
          merge-multiple: true
        continue-on-error: true

      - name: Collect JUnit XMLs into allure-results
        run: |
          mkdir -p allure-results
          find raw-artifacts/ -name "*.xml" -exec cp {} allure-results/ \; 2>/dev/null || true
          echo "Files in allure-results:"
          ls allure-results/ 2>/dev/null || echo "(empty)"

      - name: Generate Allure HTML report
        run: |
          mkdir -p allure-report
          if [ "$(ls -A allure-results/ 2>/dev/null)" ]; then
            allure generate allure-results/ --clean -o allure-report/
          else
            echo "No results yet — skipping allure generate"
          fi

      - name: Generate data.js from test results
        run: python3 testing/generate_data_js.py raw-artifacts/ gh-pages/data.js

      - name: Copy React dashboard UI to gh-pages
        run: |
          mkdir -p gh-pages/views
          cp testing/report-ui/index.html    gh-pages/index.html
          cp testing/report-ui/ui.jsx        gh-pages/ui.jsx
          cp testing/report-ui/tweaks-panel.jsx gh-pages/tweaks-panel.jsx
          cp testing/report-ui/app.jsx       gh-pages/app.jsx
          cp testing/report-ui/views/*.jsx   gh-pages/views/

      - name: Copy Allure report into gh-pages
        run: cp -r allure-report/ gh-pages/allure-report/ 2>/dev/null || mkdir -p gh-pages/allure-report

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, glob
          xmls = glob.glob("raw-artifacts/**/*.xml", recursive=True)
          total = passed = failed = skipped = 0
          rows = ""
          for xml_path in sorted(xmls):
              try:
                  root = ET.parse(xml_path).getroot()
                  suites = root.findall(".//testsuite") or [root]
                  for ts in suites:
                      for tc in ts.findall("testcase"):
                          total += 1
                          name = tc.get("name", os.path.basename(xml_path).replace(".xml",""))
                          if tc.find("failure") is not None or tc.find("error") is not None:
                              failed += 1; icon = "❌"
                          elif tc.find("skipped") is not None:
                              skipped += 1; icon = "⏭️"
                          else:
                              passed += 1; icon = "✅"
                          rows += f"| {icon} | {name} |\n"
              except Exception as e:
                  print(f"Warning: {xml_path}: {e}")
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 📊 Qatarat Test Report Published
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows if rows else "| — | No results yet |\n"}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
