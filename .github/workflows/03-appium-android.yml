name: "Appium — Deep Tests (Android)"

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      marker:
        description: "pytest marker (payment | gift | subscription | account | streaming | empty=all)"
        required: false
        default: ""

concurrency:
  group: appium-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appium-tests:
    name: Appium Deep Tests (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: testing/appium/requirements.txt

      - name: Install Python deps
        run: pip install -r testing/appium/requirements.txt

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium + drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium driver install --source=npm appium-flutter-driver

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Start Appium server
        run: |
          appium --port 4723 --log /tmp/appium.log &
          sleep 5

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          PLATFORM: android
          DEVICE_MODE: emulator
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "Qatarat (Lambda-Stage).apk"
            mkdir -p testing/appium/reports/screenshots testing/appium/allure-results
            MARKER="${{ github.event.inputs.marker }}"
            cd testing/appium
            if [ -n "$MARKER" ]; then
              python3 -m pytest tests/ -m "$MARKER" -v --html=reports/report.html --self-contained-html --tb=short -o "junit_family=xunit2" --junit-xml=reports/results.xml
            else
              python3 -m pytest tests/ -v --html=reports/report.html --self-contained-html --tb=short -o "junit_family=xunit2" --junit-xml=reports/results.xml
            fi

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          f = "testing/appium/reports/results.xml"
          if not pathlib.Path(f).exists():
              print("No results file found"); exit()
          root = ET.parse(f).getroot()
          suites = root.findall(".//testsuite") or [root]
          total = passed = failed = skipped = 0
          rows = ""
          for ts in suites:
              for tc in ts.findall("testcase"):
                  total += 1
                  name = tc.get("name","")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1; icon = "❌"
                  elif tc.find("skipped") is not None:
                      skipped += 1; icon = "⏭️"
                  else:
                      passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🤖 Appium Deep Test Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed  | {passed} |
          | ❌ Failed  | {failed} |
          | ⏭️ Skipped | {skipped} |
          | 📊 Total   | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Test |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-allure-results-${{ github.run_number }}
          path: testing/appium/allure-results/
          retention-days: 30

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-junit-${{ github.run_number }}
          path: testing/appium/reports/results.xml
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-html-report-${{ github.run_number }}
          path: testing/appium/reports/report.html
          retention-days: 30

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-screenshots-${{ github.run_number }}
          path: testing/appium/reports/screenshots/
          retention-days: 14

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-server-log-${{ github.run_number }}
          path: /tmp/appium.log
          retention-days: 7
