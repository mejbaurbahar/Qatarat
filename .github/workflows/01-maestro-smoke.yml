name: "Maestro — Smoke (Android)"

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: maestro-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Tests (Android API 33)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Smoke Suite on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r "Qatarat (Lambda-Stage).apk"
            mkdir -p testing/maestro/reports
            maestro test --format junit --output testing/maestro/reports/smoke-results.xml testing/maestro/flows/suites/smoke.yaml

      - name: Publish step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, pathlib
          f = "testing/maestro/reports/smoke-results.xml"
          if not pathlib.Path(f).exists():
              print("No results file found"); exit()
          root = ET.parse(f).getroot()
          suites = root.findall(".//testsuite") or [root]
          total = passed = failed = 0
          rows = ""
          for ts in suites:
              for tc in ts.findall("testcase"):
                  total += 1
                  name = tc.get("name","")
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1; icon = "❌"
                  else:
                      passed += 1; icon = "✅"
                  rows += f"| {icon} | {name} |\n"
          pct = int(passed/total*100) if total else 0
          bar = "🟩"*(pct//10) + "🟥"*((100-pct)//10)
          summary = f"""## 🧪 Maestro Smoke Results
          {bar}
          | Metric | Value |
          |--------|-------|
          | ✅ Passed | {passed} |
          | ❌ Failed | {failed} |
          | 📊 Total  | {total} |
          | 📈 Pass rate | {pct}% |

          ### Test Details
          | Status | Flow |
          |--------|------|
          {rows}"""
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write(summary)
          EOF

      - name: Upload JUnit results (for report page)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-junit-${{ github.run_number }}
          path: testing/maestro/reports/smoke-results.xml
          retention-days: 30

      - name: Upload Maestro screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-smoke-screenshots-${{ github.run_number }}
          path: ~/.maestro/tests/
          retention-days: 14
