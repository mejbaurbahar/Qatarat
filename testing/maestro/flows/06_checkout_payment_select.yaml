appId: com.qatarat.app
---
# Flow: Cart → Checkout → Payment method selection (no actual payment)

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Add item to cart
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 10000
    optional: true
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Go to cart → checkout
- tapOn:
    text: "Cart"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Checkout"
    optional: true
- waitForAnimationToEnd

# Payment method screen
- takeScreenshot: checkout_payment_selection

# Verify Tabby BNPL visible
- tapOn:
    text: "Pay later with Tabby"
    optional: true

# Promo code
- tapOn:
    text: "Redeem your Promo Code"
    optional: true
- inputText: "TEST10"
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: checkout_promo_applied
