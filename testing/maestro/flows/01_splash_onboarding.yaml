appId: com.qatarat.app
---
# Flow: Splash → country & language selection → home
# Note: give the app a full 20s to cold-boot on CI emulators

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country picker — tap if visible, skip if already configured
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- scrollUntilVisible:
    element:
      text: "Saudi Arabia"
    direction: DOWN
    timeout: 10000
    optional: true
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Language picker
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: splash_onboarding_complete
