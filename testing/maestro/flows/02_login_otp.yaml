appId: com.qatarat.app
---
# Flow: Phone number entry → OTP verification → logged-in home

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Skip onboarding if shown
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true

- inputText: "8801685220417"

# Accept T&C if shown
- tapOn:
    text: "By clicking continue"
    optional: true
- tapOn:
    text: "Continue"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

# OTP screen — input code
- inputText: "1234"

# Tap Verify
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: login_otp_success
