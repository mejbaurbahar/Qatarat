appId: com.qatarat.app
---
# Flow: Switch app language (Arabic RTL, Turkish, Urdu, English) and verify UI adapts

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Pick Arabic on onboarding
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "Arabic"
    optional: true
- tapOn:
    text: "عربي"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: language_arabic

# Relaunch and pick Turkish
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "Turkish"
    optional: true
- tapOn:
    text: "Türkçe"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: language_turkish

# Relaunch and pick Urdu (RTL)
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "Urdu"
    optional: true
- tapOn:
    text: "اردو"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: language_urdu

# Restore English
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: language_english_restored
