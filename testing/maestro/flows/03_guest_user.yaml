appId: com.qatarat.app
---
# Flow: Launch as guest user → verify guest browsing works

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Skip if already past onboarding
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Select guest mode
- tapOn:
    text: "Guest User"
    optional: true
- tapOn:
    text: "Continue as Guest"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: guest_user_home

# Verify login prompt appears when accessing protected feature
- tapOn:
    text: "My Orders"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: guest_user_login_prompt
