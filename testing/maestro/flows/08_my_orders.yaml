appId: com.qatarat.app
---
# Flow: View orders list, order details, rate an order

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to My Orders
- tapOn:
    text: "My Orders"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: my_orders_list

# See all orders
- tapOn:
    text: "See All Orders"
    optional: true
- waitForAnimationToEnd

# Tap first order if available
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

- takeScreenshot: order_detail

# Rate an order
- tapOn:
    text: "Rate Order"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Type your feedback"
    optional: true
- inputText: "Excellent service, very satisfied!"
- tapOn:
    text: "Submit Rating"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: order_rating_submitted
