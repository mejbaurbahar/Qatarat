appId: com.qatarat.app
---
# Flow: Subscribe to recurring weekly/monthly donation

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Add item to cart
- tapOn:
    text: "Select a Service"
    optional: true
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 10000
    optional: true
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd

# Go to cart → checkout
- tapOn:
    text: "Cart"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Checkout"
    optional: true
- waitForAnimationToEnd

# Subscription prompt
- tapOn:
    text: "Yes"
    optional: true
- waitForAnimationToEnd

# Select weekly
- tapOn:
    text: "Weekly"
    optional: true
- waitForAnimationToEnd

# Confirm subscription
- tapOn:
    text: "Subscribe Now"
    optional: true
- tapOn:
    text: "Subscribe now for Reminder"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: subscription_success
