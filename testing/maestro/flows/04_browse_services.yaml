appId: com.qatarat.app
---
# Flow: Browse services, mosque selection, item details

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Services page
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd

# Browse mosque list
- scrollUntilVisible:
    element:
      text: "Mecca mosque"
    direction: DOWN
    timeout: 8000
    optional: true

- tapOn:
    text: "Mecca mosque"
    optional: true
- waitForAnimationToEnd

# Mosque selection confirmation
- tapOn:
    text: "Yes"
    optional: true
- waitForAnimationToEnd

# Check More Details is accessible
- tapOn:
    text: "More Details"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Back"
    optional: true

- takeScreenshot: browse_services_complete
