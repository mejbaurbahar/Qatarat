appId: com.qatarat.app
---
# Negative: invalid, expired, empty, and injection promo codes must all be rejected

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "By clicking continue"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Add item to cart
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Cart"
    optional: true
- waitForAnimationToEnd

# ── Test 1: invalid promo code ───────────────────────
- tapOn:
    text: "Redeem your Promo Code"
    optional: true
- tapOn:
    text: "Promo Code"
    optional: true
- inputText: "INVALID123"
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible:
    text: "Promo Code Applied"
- takeScreenshot: promo_invalid_rejected

# ── Test 2: empty promo code ─────────────────────────
- clearKeychain
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- assertNotVisible:
    text: "Promo Code Applied"
- takeScreenshot: promo_empty_rejected

# ── Test 3: special-character promo ──────────────────
- inputText: "TEST@#$%"
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible:
    text: "Promo Code Applied"
- takeScreenshot: promo_special_chars_rejected

# ── Test 4: SQL injection attempt ────────────────────
- clearKeychain
- inputText: "' OR '1'='1"
- tapOn:
    text: "Apply"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible:
    text: "Promo Code Applied"
- takeScreenshot: promo_sql_injection_safe
