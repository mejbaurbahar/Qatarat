appId: com.qatarat.app
---
# Flow: Cancel an existing order from My Orders (dialog shown, cancel declined)

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Go to orders
- tapOn:
    text: "My Orders"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "See All Orders"
    optional: true
- waitForAnimationToEnd

# Open first order
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

# Cancel order dialog
- tapOn:
    text: "Cancel Order"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: cancel_order_dialog

# Don't confirm — tap No
- tapOn:
    text: "No"
    optional: true
- tapOn:
    text: "Back"
    optional: true

- takeScreenshot: cancel_order_declined
