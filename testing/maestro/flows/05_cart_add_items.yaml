appId: com.qatarat.app
---
# Flow: Add items to cart, verify cart state, update quantity

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

# Login first (required to add to cart)
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to services/home
- tapOn:
    text: "Select a Service"
    optional: true
- waitForAnimationToEnd

# Add first available item
- scrollUntilVisible:
    element:
      text: "Add"
    direction: DOWN
    timeout: 10000
    optional: true
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Go to cart
- tapOn:
    text: "Cart"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: cart_with_items

# Increase quantity
- tapOn:
    text: "+"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: cart_quantity_updated
