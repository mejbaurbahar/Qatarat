appId: com.qatarat.app
---
# Negative: wrong OTP must be rejected — user must NOT reach the home screen

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "By clicking continue"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# ── Test 1: wrong OTP (9999) ─────────────────────────
- inputText: "9999"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- assertNotVisible:
    text: "Cart"
- takeScreenshot: login_wrong_otp_rejected

# ── Test 2: all-zeros OTP ────────────────────────────
- clearKeychain
- inputText: "0000"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- assertNotVisible:
    text: "Cart"
- takeScreenshot: login_zeros_otp_rejected

# ── Test 3: verify resend option exists ──────────────
- assertVisible:
    text: "Resend"
    optional: true
- takeScreenshot: login_resend_option_visible
