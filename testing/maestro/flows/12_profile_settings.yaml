appId: com.qatarat.app
---
# Flow: Profile → change currency, about, logout dialog

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Open profile / account menu
- tapOn:
    text: "Profile"
    optional: true
- tapOn:
    text: "Account"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: profile_settings_screen

# Change currency
- tapOn:
    text: "Change Currency"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Back"
    optional: true

# About Qatarat
- tapOn:
    text: "About"
    optional: true
- tapOn:
    text: "About Qatarat"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Back"
    optional: true

# Logout dialog — cancel it
- tapOn:
    text: "Logout"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "No"
    optional: true

- takeScreenshot: logout_cancelled
