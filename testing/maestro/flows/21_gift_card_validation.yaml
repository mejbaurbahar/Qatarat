appId: com.qatarat.app
---
# Negative: gift card form validation — empty, invalid phone, XSS, SQL injection

- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 20000

- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "By clicking continue"
    optional: true
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- tapOn:
    text: "Gift to someone you love"
    optional: true
- tapOn:
    text: "Gift Card"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# ── Test 1: submit empty form ────────────────────────
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Save Gift Details"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- assertNotVisible:
    text: "Gift Card Preview"
- takeScreenshot: gift_empty_form_blocked

# ── Test 2: invalid recipient phone ──────────────────
- tapOn:
    text: "Enter recipient Name"
    optional: true
- inputText: "Test User"
- tapOn:
    text: "Recipient Number"
    optional: true
- inputText: "abc"
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- assertNotVisible:
    text: "Gift Card Preview"
- takeScreenshot: gift_invalid_phone_blocked

# ── Test 3: XSS in message field ─────────────────────
- tapOn:
    text: "What do you want to say?"
    optional: true
- clearKeychain
- inputText: "<script>alert('xss')</script>"
- tapOn:
    text: "Preview"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# App must not execute the script — just screenshot the result
- takeScreenshot: gift_xss_in_message

# ── Test 4: SQL injection in name ────────────────────
- tapOn:
    text: "Enter recipient Name"
    optional: true
- clearKeychain
- inputText: "'; DROP TABLE users; --"
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible:
    text: "SQL"
- assertNotVisible:
    text: "syntax error"
- takeScreenshot: gift_sql_injection_safe
