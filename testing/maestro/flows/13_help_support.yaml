appId: com.qatarat.app
---
# Flow: Help & Support — help centre, WhatsApp, email

- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 20000

# Country / language selection (cold start)
- tapOn:
    text: "Select your country"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Saudi Arabia"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Select your language"
    optional: true
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    text: "Skip"
    optional: true

# Login
- tapOn:
    text: "Login to your account"
    optional: true
- tapOn:
    text: "Enter phone number"
    optional: true
- inputText: "8801685220417"
- tapOn:
    text: "Continue"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- inputText: "1234"
- tapOn:
    text: "Verify"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Navigate to Help/Support
- tapOn:
    text: "How can we help?"
    optional: true
- tapOn:
    text: "Help"
    optional: true
- tapOn:
    text: "Support"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: help_support_screen

# Search for help
- tapOn:
    text: "Search for Help"
    optional: true
- inputText: "payment"
- waitForAnimationToEnd

- takeScreenshot: help_search_results
