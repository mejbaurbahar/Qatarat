[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --alluredir=allure-results
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short
log_cli = true
log_cli_level = INFO
markers =
    android: Android-only tests
    ios: iOS-only tests
    payment: Payment flow tests
    gift: Gift card tests
    subscription: Subscription tests
    account: Profile and account tests
    smoke: Fast smoke tests
    regression: Full regression suite
